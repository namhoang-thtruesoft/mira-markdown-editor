name: TrueMarkdown
options:
  bundleIdPrefix: com.thtruesoft
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  usesTabs: false
  indentWidth: 4
  tabWidth: 4

packages:
  swift-markdown:
    url: https://github.com/apple/swift-markdown
    from: 0.4.0
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.0

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    INFOPLIST_KEY_LSMinimumSystemVersion: "14.0"
    INFOPLIST_KEY_CFBundleDisplayName: True Markdown
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleName: True Markdown
    SWIFT_EMIT_LOC_STRINGS: YES

targets:
  # ─── Mac App Store Target ──────────────────────────────────────────────────
  TrueMarkdown-AppStore:
    type: application
    platform: macOS
    sources:
      - path: TrueMarkdown
    resources:
      - path: TrueMarkdown/Resources
    entitlements:
      path: Targets/AppStore/TrueMarkdown-AppStore.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thtruesoft.truemarkdown
        PRODUCT_NAME: True Markdown
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 ThTrueSoft. MIT License."
      configs:
        Debug:
          OTHER_SWIFT_FLAGS: -DDEBUG
        Release:
          OTHER_SWIFT_FLAGS: ""
    dependencies:
      - package: swift-markdown
        product: Markdown
    info:
      path: Targets/AppStore/Info.plist
      properties:
        CFBundleDocumentTypes:
          - CFBundleTypeName: Markdown Document
            CFBundleTypeRole: Editor
            LSHandlerRank: Owner
            LSItemContentTypes:
              - net.daringfireball.markdown
              - public.plain-text
            CFBundleTypeExtensions:
              - md
              - markdown
            CFBundleTypeIconSystemName: doc.text
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: net.daringfireball.markdown
            UTTypeDescription: Markdown Document
            UTTypeConformsTo:
              - public.plain-text
              - public.text
            UTTypeTagSpecification:
              public.filename-extension:
                - md
                - markdown
              public.mime-type: text/markdown

  # ─── Direct Download Target ─────────────────────────────────────────────────
  TrueMarkdown-Direct:
    type: application
    platform: macOS
    sources:
      - path: TrueMarkdown
      - path: Targets/Direct
    resources:
      - path: TrueMarkdown/Resources
    entitlements:
      path: Targets/Direct/TrueMarkdown-Direct.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thtruesoft.truemarkdown-direct
        PRODUCT_NAME: True Markdown
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 ThTrueSoft. MIT License."
      configs:
        Debug:
          OTHER_SWIFT_FLAGS: -DDEBUG -DDIRECT_DOWNLOAD
        Release:
          OTHER_SWIFT_FLAGS: -DDIRECT_DOWNLOAD
    dependencies:
      - package: swift-markdown
        product: Markdown
      - package: Sparkle
        product: Sparkle
    info:
      path: Targets/Direct/Info.plist
      properties:
        CFBundleDocumentTypes:
          - CFBundleTypeName: Markdown Document
            CFBundleTypeRole: Editor
            LSHandlerRank: Owner
            LSItemContentTypes:
              - net.daringfireball.markdown
              - public.plain-text
            CFBundleTypeExtensions:
              - md
              - markdown
            CFBundleTypeIconSystemName: doc.text
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: net.daringfireball.markdown
            UTTypeDescription: Markdown Document
            UTTypeConformsTo:
              - public.plain-text
              - public.text
            UTTypeTagSpecification:
              public.filename-extension:
                - md
                - markdown
              public.mime-type: text/markdown

  # ─── Unit Tests ──────────────────────────────────────────────────────────────
  TrueMarkdownTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: TrueMarkdownTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thtruesoft.truemarkdown-tests
    dependencies:
      - target: TrueMarkdown-AppStore
      - package: swift-markdown
        product: Markdown

schemes:
  True Markdown (AppStore):
    build:
      targets:
        TrueMarkdown-AppStore: all
    run:
      config: Debug
    test:
      targets:
        - TrueMarkdownTests
      config: Debug
    profile:
      config: Release
    archive:
      config: Release

  True Markdown (Direct):
    build:
      targets:
        TrueMarkdown-Direct: all
    run:
      config: Debug
    test:
      targets:
        - TrueMarkdownTests
      config: Debug
    profile:
      config: Release
    archive:
      config: Release
